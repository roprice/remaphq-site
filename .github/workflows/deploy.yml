name: Deploy to DigitalOcean

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 165.227.138.219
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /var/www/remaphq.com
            git pull origin main